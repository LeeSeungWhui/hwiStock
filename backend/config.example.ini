# Local example config (DO NOT put secrets in git)

[DATABASE]
name = main_db
type = sqlite
database = ./data/main.db
query_dir = query
query_watch = true
query_watch_debounce_ms = 150

[AUTH]
token_enable = true
# ⚠️ 운영 반영 전 반드시 교체: 이 값 그대로면 서버가 기동 실패하도록 설계되어 있음
#    생성 예시: python -c "import secrets; print(secrets.token_urlsafe(48))"
secret_key = replace-with-strong-random-secret
token_expire = 3600
refresh_expire = 604800
access_cookie = access_token
refresh_cookie = refresh_token

[CORS]
allow_origins = http://localhost:5000,http://127.0.0.1:5000,http://localhost
allow_credentials = true

[OBSERVABILITY]
sql_warn_threshold = 40
# IP 위치 추정(외부 API) 활성화 여부. 기본 false 권장.
ip_geo_enabled = false
# 외부 IP 위치 조회 타임아웃(ms)
ip_geo_timeout_ms = 700
# IP 위치 조회 캐시 TTL(초)
ip_geo_cache_ttl_sec = 3600

[API_POLICY]
# 외부 HTTP/SDK 호출 기본 timeout(초)
request_timeout_sec = 5
# 목록 조회 기본 size 상한
list_size_max = 100
# 설정 실수 방지용 절대 상한
absolute_list_size_cap = 500

[API_POLICY.dashboard.list]
request_timeout_sec = 3
list_size_max = 200

[API_POLICY.sample.adminUserList]
request_timeout_sec = 3
list_size_max = 50

[API_POLICY.ipGeoLookup]
request_timeout_sec = 1

[SERVER]
port = 5001
backendHost = http://127.0.0.1:5001
frontendHost = http://127.0.0.1:5000
runtime = DEV
